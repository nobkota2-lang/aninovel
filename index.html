[data-theme="dark"]{--bg-primary:#1A1A1A;--bg-secondary:#222;--bg-paper:#252525;--bg-toolbar:#222;--bg-toolbar-author:#2A1428;--text-primary:#E8E0D8;--text-secondary:#A09890;--text-muted:#706860;--accent:#E74C3C;--accent-soft:#FF6B5A;--accent-author:#9B59B6;--accent-author-soft:#BB7CD4;--border:#3A3530;--border-light:#302C28;--shadow:rgba(0,0,0,0.3);--shadow-strong:rgba(0,0,0,0.5);--progress-bg:rgba(231,76,60,0.2);--progress-fill:#E74C3C;--overlay:rgba(0,0,0,0.7);--panel-bg:#2A2A2A}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Zen Kaku Gothic New','Noto Serif JP',serif;background:var(--bg-primary);color:var(--text-primary);transition:background .4s,color .4s}
#app{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}
.font-serif-jp{font-family:'Shippori Mincho','Noto Serif JP',serif}
.vertical-scroll-container{overflow-x:auto;overflow-y:hidden;height:100%;display:flex;flex-direction:row-reverse}
.vertical-content-wrapper{display:flex;flex-direction:row-reverse;height:100%;min-width:max-content;padding:2rem}
.vertical-item{writing-mode:vertical-rl;text-orientation:mixed;height:100%;margin-left:2.5rem;display:inline-block}
.v-bubble-wrap{position:relative;writing-mode:vertical-rl;text-orientation:mixed;height:100%;margin-left:2.5rem;display:inline-block}
.v-bubble-wrap .v-icon{position:absolute;top:-6px;right:-6px;z-index:3;writing-mode:horizontal-tb}
.v-bubble-wrap .v-bubble-body{border-radius:16px;box-shadow:0 2px 8px var(--shadow);overflow-y:auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.anim-fade{animation:fadeIn .3s ease-out}.anim-slide-up{animation:slideUp .4s ease-out}.anim-slide-down{animation:slideDown .25s ease-out}
.progress-bar{height:3px;background:var(--progress-bg);overflow:hidden}.progress-fill{height:100%;background:var(--progress-fill);transition:width .5s cubic-bezier(.4,0,.2,1)}
.bubble{position:relative;border-radius:16px;padding:14px 18px;box-shadow:0 2px 8px var(--shadow);max-width:480px;transition:transform .2s,box-shadow .2s}.bubble:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow-strong)}
.bubble-left::before{content:'';position:absolute;left:-8px;top:16px;border:8px solid transparent;border-right-color:inherit;border-left:0}
.bubble-right::after{content:'';position:absolute;right:-8px;top:16px;border:8px solid transparent;border-left-color:inherit;border-right:0}
.insert-area{padding:2px 0;border-radius:8px;transition:all .2s ease;min-height:32px}
.drag-active .insert-area{min-height:56px;background:rgba(142,68,173,.04);border:2px dashed transparent;border-color:rgba(142,68,173,.2)}
.drag-active .insert-area .insert-row .ibtn{border-color:rgba(142,68,173,.3);color:var(--accent-author-soft)}
.insert-area.drag-over{background:rgba(142,68,173,.15)!important;outline:2px dashed var(--accent-author);outline-offset:-2px;min-height:64px!important}
.insert-area.drag-over .insert-row{display:none}
.insert-area.drag-over::after{content:'▼ ここにドロップ ▼';display:block;text-align:center;color:var(--accent-author);font-size:14px;font-weight:600;padding:16px}
.vertical-content-wrapper .insert-area{writing-mode:horizontal-tb;min-height:auto;min-width:24px;height:100%;padding:0 2px;margin-left:4px;display:flex;align-items:center;justify-content:center}
.vertical-content-wrapper .insert-area .insert-row{flex-direction:column;padding:0 2px;gap:4px}
.vertical-content-wrapper .insert-area .insert-row .ibtn{writing-mode:horizontal-tb;padding:8px 4px;font-size:11px;white-space:normal;text-align:center;line-height:1.2;max-width:32px}
.drag-active .vertical-content-wrapper .insert-area{min-width:40px;background:rgba(142,68,173,.04);border:2px dashed rgba(142,68,173,.2)}
.vertical-content-wrapper .insert-area.drag-over{min-width:56px!important;outline:2px dashed var(--accent-author);outline-offset:-2px;background:rgba(142,68,173,.15)!important}
.vertical-content-wrapper .insert-area.drag-over .insert-row{display:none}
.vertical-content-wrapper .insert-area.drag-over::after{padding:8px;writing-mode:vertical-rl;text-orientation:mixed}
.char-card[draggable="true"]{cursor:grab;border:2px solid transparent}.char-card[draggable="true"]:hover{border-color:var(--accent-author);background:rgba(142,68,173,.06)}
.char-card[draggable="true"]:active{cursor:grabbing}
.drag-active .panel-slide{pointer-events:none!important;opacity:.3!important}
.insert-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 0}
.insert-row .ibtn{padding:4px 14px;font-size:12px;border-radius:14px;border:1px dashed var(--border);background:transparent;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap}
.insert-row .ibtn:hover{border-color:var(--accent-author);color:var(--accent-author);background:rgba(142,68,173,.06);border-style:solid}
.citem{position:relative;transition:opacity .15s;overflow:visible}.citem.dragging{opacity:.3}
.citem .drag-handle{position:absolute;left:2px;top:2px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--text-muted);font-size:12px;opacity:0;transition:opacity .15s;border-radius:6px;background:var(--panel-bg);border:1px solid var(--border);z-index:10;box-shadow:0 1px 4px var(--shadow)}
.citem .drag-handle:hover{background:var(--accent-author);color:#fff;border-color:var(--accent-author)}.citem:hover .drag-handle{opacity:1}.citem .drag-handle:active{cursor:grabbing}
.panel-slide{position:fixed;top:0;right:-400px;width:380px;height:100%;background:var(--panel-bg);box-shadow:-4px 0 24px var(--shadow-strong);transition:right .35s cubic-bezier(.4,0,.2,1);z-index:40;overflow-y:auto}.panel-slide.open{right:0}
.modal-overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:50;animation:fadeIn .2s ease-out}
.modal-content{background:var(--panel-bg);border-radius:16px;padding:28px;max-width:640px;width:95%;max-height:90vh;overflow-y:auto;animation:scaleIn .25s ease-out;box-shadow:0 24px 64px var(--shadow-strong)}
.btn{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-soft)}
.btn-author{background:var(--accent-author);color:#fff}.btn-author:hover{background:var(--accent-author-soft)}
.btn-ghost{background:transparent;color:var(--text-primary);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg-secondary)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:inherit;cursor:pointer;transition:all .2s;font-size:18px}
.btn-icon:hover{background:rgba(255,255,255,.15)}
.toolbar .btn-icon{filter:brightness(1.3)}
.toolbar{background:var(--bg-toolbar);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}.toolbar.author-mode{background:var(--bg-toolbar-author)}
.tool-palette{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
.tool-chip{padding:6px 14px;background:var(--panel-bg);border:1px solid var(--border);border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .2s;user-select:none}.tool-chip:hover{border-color:var(--accent-author)}
.page-area{flex:1;overflow:auto;background:var(--bg-paper);position:relative}
.page-area::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--border-light) 39px,var(--border-light) 40px);opacity:.3;pointer-events:none;z-index:0}
.page-footer{flex-shrink:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.char-icon{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;box-shadow:0 2px 8px var(--shadow);flex-shrink:0;transition:transform .2s;overflow:hidden}.char-icon:hover{transform:scale(1.08)}.char-icon img{width:100%;height:100%;object-fit:cover}
.search-highlight{background:#FBBF24;color:#000;padding:1px 2px;border-radius:2px}
input,select,textarea{background:var(--panel-bg);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text-muted);font-style:italic}
input[type="range"]{padding:0;border:none;background:transparent;-webkit-appearance:auto;appearance:auto}
input[type="color"]{padding:2px;cursor:pointer;height:40px}
.fullscreen-mode{position:fixed!important;inset:0!important;z-index:100!important}
.home-hero{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#2D2A26 0%,#4A3728 40%,#6B4423 80%,#8B5E3C 100%);color:#FAF6F0;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='none' stroke='%23ffffff' stroke-width='0.3' opacity='0.05'/%3E%3C/svg%3E");pointer-events:none}
.home-hero::after{content:'物語';position:absolute;right:-60px;top:50%;transform:translateY(-50%);font-size:280px;font-family:'Shippori Mincho',serif;font-weight:700;opacity:.03;pointer-events:none;writing-mode:vertical-rl}
.char-card{border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;background:var(--panel-bg)}.char-card:hover{border-color:var(--accent-author);box-shadow:0 4px 12px var(--shadow)}
.narration-plain{border-left:3px solid var(--border);padding-left:16px;margin:0 auto}
.gallery-tab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--panel-bg);transition:all .2s}.gallery-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.gallery-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.gallery-item{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;transition:all .2s;border:3px solid transparent;background:var(--bg-secondary)}.gallery-item:hover{border-color:var(--accent);transform:scale(1.05)}
@media(max-width:768px){.panel-slide{width:100%;right:-100%}.bubble{max-width:280px}.toolbar{padding:0 10px;height:48px}.gallery-grid{grid-template-columns:repeat(4,1fr)}}
</style>

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
var _ec={};
var _acts=[];
function act(n){if(_acts[n])_acts[n]()}

function cacheForEdit(t,o){var k='_e'+Date.now()+'_'+Math.random().toString(36).substr(2,5);_ec[k]={type:t,data:o};return k}
function triggerEdit(k){var e=_ec[k];if(e)openEditModal(e.type,e.data)}
function getPC(){var a=state.content.slice().sort(function(x,y){return x.order-y.order});var br=[-1];a.forEach(function(i){if(i.type==='pageBreak')br.push(i.order)});br.push(Infinity);var s=br[state.currentPage]+1,e=br[state.currentPage+1];return a.filter(function(c){return c.order>=s&&c.order<e&&c.type!=='pageBreak'})}
function getTP(){return state.content.filter(function(c){return c.type==='pageBreak'}).length+1}
function jP(n){var t=getTP();if(n>=0&&n<t&&n!==state.currentPage){state.currentPage=n;render()}}
function scrollToItem(id){if(!id)return;requestAnimationFrame(function(){var el=document.querySelector('[data-cid="'+id+'"]');if(el)el.scrollIntoView({behavior:'smooth',block:'center'})})}
function saveData(){try{localStorage.setItem('aninovel_data',JSON.stringify({version:'2.2',novel:state.novel,chapters:state.chapters,characters:state.characters,content:state.content,displaySettings:state.displaySettings,bookmarks:state.bookmarks,darkMode:state.darkMode,timestamp:new Date().toISOString()}));state.lastSaved=new Date().toLocaleTimeString()}catch(e){console.error(e)}render()}
function loadData(){try{var s=localStorage.getItem('aninovel_data');if(s){var d=JSON.parse(s);state.novel=d.novel||state.novel;state.chapters=d.chapters||state.chapters;state.characters=d.characters||state.characters;state.content=d.content||state.content;if(d.displaySettings)Object.assign(state.displaySettings,d.displaySettings);state.bookmarks=d.bookmarks||[];if(d.darkMode!==undefined)state.darkMode=d.darkMode}}catch(e){console.error(e)}}
function exportData(){var b=new Blob([JSON.stringify({version:'2.2',novel:state.novel,chapters:state.chapters,characters:state.characters,content:state.content,displaySettings:state.displaySettings,bookmarks:state.bookmarks,timestamp:new Date().toISOString()},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=state.novel.title+'_'+Date.now()+'.aninovel';a.click();URL.revokeObjectURL(a.href)}
function addChapter(){state.chapters.push({id:'ch'+Date.now(),title:'第'+(state.chapters.length+1)+'章',sections:[{id:'sec'+Date.now(),title:'第1節'}]});render()}
function addSection(ci){var ch=state.chapters[ci||0];if(ch){ch.sections.push({id:'sec'+Date.now(),title:'第'+(ch.sections.length+1)+'節'});render()}}
function addCharacter(){var c={id:'char'+Date.now(),name:'',shortName:'',gender:'male',description:'',bubbleColor:'#DBEAFE',iconColor:'#3B82F6',iconImage:null};state.characters.push(c);openEditModal('character',c)}
function addFirst(){insertAt('narration',0)}
function insertAt(type,pos,charId){var nc={id:'c'+Date.now(),type:type,text:'',characterId:charId||(type==='dialogue'?(state.characters.filter(function(c){return c.id!=='narrator'})[0]||{}).id||null:null),order:pos};state.content.forEach(function(c){if(c.order>=pos)c.order++});state.content.push(nc);state._scrollToId=nc.id;openEditModal('content',nc)}
function addContent(type,pos,cid){insertAt(type,pos!=null?pos:state.content.length)}
function addPageBreak(){state.content.push({id:'pb'+Date.now(),type:'pageBreak',order:state.content.length});render()}
function updateItem(id,up,type){var a=type==='character'?state.characters:state.content;var i=a.findIndex(function(c){return c.id===id});if(i!==-1)a[i]=Object.assign({},a[i],up);state._scrollToId=id;render()}

function performSearch(q){state.searchQuery=q;if(!q){state.searchResults=[];state.searchCurrentIdx=-1;render();restoreSearchFocus(q);return}var ql=q.toLowerCase();var fql=toFullWidth(q).toLowerCase();state.searchResults=state.content.filter(function(c){if(!c.text)return false;var tl=c.text.toLowerCase();var ftl=toFullWidth(c.text).toLowerCase();return tl.indexOf(ql)>=0||ftl.indexOf(fql)>=0||tl.indexOf(fql)>=0||ftl.indexOf(ql)>=0}).map(function(c){return{id:c.id,order:c.order}});state.searchCurrentIdx=state.searchResults.length>0?0:-1;if(state.searchResults.length>0){navSearch(0)}else{render()}restoreSearchFocus(q)}

function displayText(text,query){var c=toFullWidth(text||'');if(!query)return hlText(c,null);var fq=toFullWidth(query);var r1=hlText(c,fq);if(r1!==esc(c))return r1;return hlText(c,query)}
function showToast(msg){var t=document.createElement('div');t.className='anim-slide-up';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg-toolbar);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;z-index:999;box-shadow:0 4px 16px var(--shadow-strong)';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s'},2000);setTimeout(function(){t.remove()},2500)}

async function handleFileImport(ev){var f=ev.target.files[0];if(!f)return;if(!confirm('現在のデータを上書きしてインポートしますか？'))return;var ext=f.name.split('.').pop().toLowerCase();try{if(ext==='aninovel'){var e=await detEnc(f);var d=JSON.parse(await rdTxt(f,e));state.novel=d.novel||state.novel;state.chapters=d.chapters||state.chapters;state.characters=d.characters||state.characters;state.content=d.content||state.content;if(d.displaySettings)Object.assign(state.displaySettings,d.displaySettings);state.bookmarks=d.bookmarks||[];showToast('インポート完了');render()}else if(ext==='txt'){var e2=await detEnc(f);parseText(await rdTxt(f,e2));showToast('テキストインポート完了')}else if(ext==='docx'){var r=await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()});parseText(r.value);showToast('Wordインポート完了')}else if(ext==='pdf'){var pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;var t='';for(var i=1;i<=pdf.numPages;i++){var p=await pdf.getPage(i);var tc=await p.getTextContent();t+=tc.items.map(function(it){return it.str}).join(' ')+'\n'}parseText(t);showToast('PDFインポート完了')}else if(ext==='epub'){var z=await JSZip.loadAsync(f);var t2='';for(var fn in z.files){if(fn.endsWith('.html')||fn.endsWith('.xhtml')){var c=await z.files[fn].async('text');t2+=new DOMParser().parseFromString(c,'text/html').body.textContent+'\n'}}parseText(t2);showToast('EPUBインポート完了')}else alert('非対応')}catch(e){alert('エラー: '+e.message)}}
async function detEnc(file){return new Promise(function(r){var rd=new FileReader;rd.onload=function(e){var a=new Uint8Array(e.target.result);if(a.length>=3&&a[0]===0xEF&&a[1]===0xBB&&a[2]===0xBF)return r('UTF-8');r('UTF-8')};rd.readAsArrayBuffer(file)})}
async function rdTxt(f,e){return new Promise(function(r,j){var rd=new FileReader;rd.onload=function(ev){r(ev.target.result)};rd.onerror=j;rd.readAsText(f,e||'UTF-8')})}
function detGender(n){if(/[子美香織恵愛花里奈沙菜実梨彩由佳理代紀]/.test(n))return'female';if(/[郎太介助男雄彦司夫治朗]/.test(n))return'male';return'male'}
function parseText(text){state.content=[];var nar=state.characters.find(function(c){return c.id==='narrator'});state.characters=nar?[nar]:[state.characters[state.characters.length-1]];var lines=text.split('\n').filter(function(l){return l.trim()});var order=0;var det=new Set();lines.forEach(function(line,idx){line=line.trim();if(!line)return;var m=line.match(/(.+?)「(.+?)」/);if(m&&m[1].length<20){var sp=m[1].trim();var dl=m[2];var ch=state.characters.find(function(c){return c.id!=='narrator'&&(c.name===sp||c.shortName===sp)});if(!ch){var g=detGender(sp);var pr=(CP[g]||CP.male)[det.size%5];ch={id:'char'+Date.now()+idx,name:sp,shortName:sp.substring(0,2),gender:g,description:'',bubbleColor:pr.bubble,iconColor:pr.icon,iconImage:null};state.characters.push(ch);det.add(sp)}state.content.push({id:'imp'+Date.now()+idx,type:'dialogue',text:dl,characterId:ch.id,order:order++})}else{state.content.push({id:'imp'+Date.now()+idx,type:'narration',text:line,order:order++})}});state.currentPage=0;render()}

// Attached to #app element after each render
var _dType=null,_dPayload=null,_tClone=null,_tMoved=false;

function activateDragMode(){
    var pa=document.getElementById('pageArea');
    if(pa)pa.classList.add('drag-active');
}
function deactivateDragMode(){
    var pa=document.getElementById('pageArea');
    if(pa)pa.classList.remove('drag-active');
}
function findNearestDropPos(e){
    var zones=document.querySelectorAll('[data-droppos]');
    var best=null,bestDist=Infinity;
    zones.forEach(function(z){
        var r=z.getBoundingClientRect();
        var cx=r.left+r.width/2, cy=r.top+r.height/2;
        var d=Math.sqrt(Math.pow(e.clientX-cx,2)+Math.pow(e.clientY-cy,2));
        if(d<bestDist){bestDist=d;best=z}
    });
    return best;
}

function setupDnD(){
    var app=document.getElementById('app');
    if(!app)return;
    if(app._dndBound)return;
    app._dndBound=true;

    // === Desktop D&D ===
    app.addEventListener('dragstart',function(e){
        var el=e.target.closest('[data-dragid]');
        if(el){
            _dType='content';_dPayload=el.getAttribute('data-dragid');
            window._wasDragging=true;
            e.dataTransfer.effectAllowed='move';
            e.dataTransfer.setData('text/plain',_dPayload);
            setTimeout(function(){
                var c=document.querySelector('[data-cid="'+_dPayload+'"]');
                if(c)c.classList.add('dragging');
                activateDragMode();
            },0);
            return;
        }
        el=e.target.closest('[data-dragtool]');
        if(el){
            _dType='tool';_dPayload=el.getAttribute('data-dragtool');
            e.dataTransfer.effectAllowed='copy';
            e.dataTransfer.setData('text/plain','tool:'+_dPayload);
            setTimeout(activateDragMode,0);
            return;
        }
        el=e.target.closest('[data-dragchar]');
        if(el){
            _dType='character';_dPayload=el.getAttribute('data-dragchar');
            e.dataTransfer.effectAllowed='copy';
            e.dataTransfer.setData('text/plain','char:'+_dPayload);
            var ch=state.characters.find(function(c){return c.id===_dPayload});
            if(ch){
                var ghost=document.createElement('div');
                ghost.textContent='💬 '+ch.name;
                ghost.style.cssText='position:fixed;top:-100px;left:-100px;background:#8E44AD;color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;z-index:9999';
                document.body.appendChild(ghost);
                e.dataTransfer.setDragImage(ghost,40,20);
                setTimeout(function(){ghost.remove()},0);
            }
            setTimeout(activateDragMode,0);
            return;
        }
    });

    // Global dragover - always allow drop when dragging
    app.addEventListener('dragover',function(e){
        if(!_dType)return;
        e.preventDefault();
        e.dataTransfer.dropEffect=_dType==='content'?'move':'copy';
        document.querySelectorAll('.insert-area.drag-over').forEach(function(x){x.classList.remove('drag-over')});
        var z=e.target.closest('[data-droppos]');
        if(z){z.classList.add('drag-over')}
        else{
            var nearest=findNearestDropPos(e);
            if(nearest)nearest.classList.add('drag-over');
        }
    });

    app.addEventListener('dragleave',function(e){
        if(!e.relatedTarget||!app.contains(e.relatedTarget)){
            document.querySelectorAll('.drag-over').forEach(function(x){x.classList.remove('drag-over')});
        }
    });

    app.addEventListener('dragend',function(e){cleanDrag()});

    app.addEventListener('drop',function(e){
        if(!_dType)return;
        e.preventDefault();
        var z=e.target.closest('[data-droppos]');
        if(!z)z=findNearestDropPos(e);
        if(z){
            z.classList.remove('drag-over');
            execDrop(parseInt(z.getAttribute('data-droppos')));
        }
        cleanDrag();
    });

    // === Mobile Touch D&D ===
    app.addEventListener('touchstart',function(e){
        var el=e.target.closest('[data-dragid]');
        if(el&&state.isAuthorMode){
            _dType='content';_dPayload=el.getAttribute('data-dragid');_tMoved=false;
            e.preventDefault();mkClone(e.touches[0],el);
            var c=document.querySelector('[data-cid="'+_dPayload+'"]');
            if(c)c.classList.add('dragging');
            activateDragMode();
            return;
        }
        el=e.target.closest('[data-dragtool]');
        if(el){
            _dType='tool';_dPayload=el.getAttribute('data-dragtool');_tMoved=false;
            e.preventDefault();mkClone(e.touches[0],el);
            activateDragMode();
            return;
        }
        el=e.target.closest('[data-dragchar]');
        if(el){
            _dType='character';_dPayload=el.getAttribute('data-dragchar');_tMoved=false;
            e.preventDefault();
            var ch=state.characters.find(function(c){return c.id===_dPayload});
            mkClone(e.touches[0],el,ch?'💬 '+ch.name:null);
            activateDragMode();
            return;
        }
    },{passive:false});

    app.addEventListener('touchmove',function(e){
        if(!_dType||!_tClone)return;
        e.preventDefault();_tMoved=true;
        var t=e.touches[0];
        _tClone.style.left=(t.clientX-40)+'px';
        _tClone.style.top=(t.clientY-20)+'px';
        document.querySelectorAll('.drag-over').forEach(function(x){x.classList.remove('drag-over')});
        _tClone.style.display='none';
        var under=document.elementFromPoint(t.clientX,t.clientY);
        _tClone.style.display='';
        if(under){
            var zone=under.closest?under.closest('[data-droppos]'):null;
            if(!zone)zone=findNearestDropPos({clientX:t.clientX,clientY:t.clientY});
            if(zone)zone.classList.add('drag-over');
        }
    },{passive:false});

    app.addEventListener('touchend',function(e){
        if(_dType&&_tMoved){
            var t=e.changedTouches[0];
            if(_tClone){_tClone.style.display='none'}
            var under=document.elementFromPoint(t.clientX,t.clientY);
            if(_tClone){_tClone.remove();_tClone=null}
            var zone=under?under.closest?under.closest('[data-droppos]'):null:null;
            if(!zone)zone=findNearestDropPos({clientX:t.clientX,clientY:t.clientY});
            if(zone)execDrop(parseInt(zone.getAttribute('data-droppos')));
            cleanDrag();return;
        }
        if(_tClone){_tClone.remove();_tClone=null}
        cleanDrag();
    });
}

function mkClone(touch,el,label){
    _tClone=document.createElement('div');
    _tClone.textContent=label||el.textContent.substring(0,15);
    _tClone.style.cssText='position:fixed;z-index:9999;background:#8E44AD;color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:.9';
    _tClone.style.left=(touch.clientX-40)+'px';_tClone.style.top=(touch.clientY-20)+'px';
    document.body.appendChild(_tClone);
}

function cleanDrag(){
    _dType=null;_dPayload=null;
    document.querySelectorAll('.dragging').forEach(function(x){x.classList.remove('dragging')});
    document.querySelectorAll('.drag-over').forEach(function(x){x.classList.remove('drag-over')});
    deactivateDragMode();
    setTimeout(function(){window._wasDragging=false},200);
}

function execDrop(pos){
    if(_dType==='tool')insertAt(_dPayload,pos);
    else if(_dType==='character')insertAt('dialogue',pos,_dPayload);
    else if(_dType==='content'&&_dPayload){
        var item=state.content.find(function(c){return c.id===_dPayload});
        if(item){var old=item.order;state.content.forEach(function(c){if(c.order>old&&c.id!==item.id)c.order--});var nw=pos>old?pos-1:pos;state.content.forEach(function(c){if(c.order>=nw&&c.id!==item.id)c.order++});item.order=nw;state._scrollToId=item.id}
        render();
    }
    _dType=null;_dPayload=null;
}

document.addEventListener('click',function(e){var g=e.target.closest&&e.target.closest('[data-galimg]');if(g&&state.editingItem){state.editingItem.data.iconImage=g.getAttribute('data-galimg');state.imageGalleryOpen=false;render()}});
document.addEventListener('dblclick',function(e){var el=e.target.closest&&e.target.closest('[data-dblchar]');if(el){e.stopPropagation();dblClickChar(el.getAttribute('data-dblchar'))}});



// ===== WINDOW EXPORTS (inline onclick needs these) =====
window.act=act;window.state=state;window.render=render;window.insertAt=insertAt;window.addFirst=addFirst;
window.addChapter=addChapter;window.addSection=addSection;window.addCharacter=addCharacter;window.addContent=addContent;
window.addPageBreak=addPageBreak;window.updateItem=updateItem;window.deleteItem=deleteItem;window.moveContent=moveContent;
window.saveData=saveData;window.exportData=exportData;window.jP=jP;window.jumpToBookmark=jumpToBookmark;
window.addBookmark=addBookmark;window.deleteBookmark=deleteBookmark;window.handleFileImport=handleFileImport;
window.openEditModal=openEditModal;window.closeEditModal=closeEditModal;window.saveEditModal=saveEditModal;
window.toggleDarkMode=toggleDarkMode;window.performSearch=performSearch;window.navSearch=navSearch;
window.showToast=showToast;window.toFullWidth=toFullWidth;window.triggerEdit=triggerEdit;
window.cacheForEdit=cacheForEdit;window.dblClickChar=dblClickChar;window._ec=_ec;window._acts=_acts;

// ===== APP INITIALIZATION =====
window.onload=function(){
    loadData();
    document.documentElement.setAttribute('data-theme',state.darkMode?'dark':'light');
    render();
    setInterval(function(){if(state.isAuthorMode)saveData()},30000);
};

    </script>
</body>
