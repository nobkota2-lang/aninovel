<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アニノベル - 作品ポータル</title>
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>

<!-- ヘッダー -->
<header class="portal-header">
  <a href="index.html" class="logo">
    <span class="logo-text">アニノベル</span>
    <span class="logo-sub">作品ポータル</span>
  </a>
  <div class="header-actions">
    <div id="auth-area"></div>
    <button class="btn-icon" id="theme-toggle" title="テーマ切替">&#x1F313;</button>
  </div>
</header>

<!-- ヒーロー -->
<section class="portal-hero">
  <h1 class="font-serif">物語の世界へようこそ</h1>
  <p>オリジナル小説を読んで、投票して、お気に入りを見つけよう</p>
  <div class="hero-stats" id="hero-stats"></div>
</section>

<!-- メインコンテンツ -->
<main class="portal-container">

  <!-- 作品一覧 -->
  <h2 class="section-title"><span class="icon">&#x1F4DA;</span>作品一覧</h2>
  <div class="works-grid" id="works-grid"></div>

  <!-- ランキング -->
  <h2 class="section-title"><span class="icon">&#x1F3C6;</span>ランキング</h2>
  <div class="ranking-section">
    <div class="ranking-controls">
      <button class="ranking-sort-btn active" data-sort="votes">&#x2764; 投票数</button>
      <button class="ranking-sort-btn" data-sort="newest">&#x1F195; 新着順</button>
      <button class="ranking-sort-btn" data-sort="chars">&#x1F4DD; 文字数</button>
      <button class="ranking-sort-btn" data-sort="pages">&#x1F4D6; ページ数</button>
    </div>
    <div class="ranking-list" id="ranking-list"></div>
  </div>

</main>

<!-- フッター -->
<footer class="portal-footer">
  <div class="footer-links">
    <a href="viewer.html">ビューアーを開く</a>
    <a href="manual.html">マニュアル</a>
  </div>
  <p class="note">アニノベル &copy; 2026 — Phase 1 ローカル版</p>
</footer>

<script src="js/services.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
